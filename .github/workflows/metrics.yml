name: GitHub Metrics
on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Gan-cell888
          filename: github-metrics.svg
          output_action: commit
          config_timezone: Asia/Shanghai
          config_display: large
          config_padding: 6%, 6%
          config_animations: yes
          plugins_errors_fatal: false
          base: header+repositories+metadata

          # 编程语言
          plugin_languages: yes
          plugin_languages_ignored: dockerfile, makefile, shell
          plugin_languages_colors: github
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          # 贡献日历
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # 仓库展示
          plugin_repositories: yes
          plugin_repositories_featured: Gan-cell888/Gan-cell888
          plugin_repositories_order: stars
          plugin_repositories_forks: yes

          # 编码习惯
          plugin_habits: yes
          plugin_habits_days: 14
          plugin_habits_charts_type: graph
          plugin_habits_facts: yes

          # Star 趋势
          plugin_stargazers: yes
          plugin_stargazers_days: 14

          # 最近活动
          plugin_followup: yes
          plugin_followup_sections: repositories

          # 贡献者
          plugin_contributors: yes
          plugin_contributors_sections: base
          plugin_contributors_own: yes
