name: GitHub Metrics
on:
  # 每天 UTC 00:00 自动更新（北京时间 08:00）
  schedule:
    - cron: "0 0 * * *"
  # 手动触发
  workflow_dispatch:
  # 推送到 main 分支时更新
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # === 基础配置 ===
          token: ${{ secrets.METRICS_TOKEN }}
          user: Gan-cell888
          filename: github-metrics.svg

          # === 插件配置 ===
          config: |
            base: ""
            plugins_errors_fatal: false
            timezone: Asia/Shanghai

          # 概览卡片
          plugin_overview: yes
          plugin_overview_sections: repositories, stars, forks, issues, pr, commits, reviews, discussions

          # 编程语言
          plugin_languages: yes
          plugin_languages_ignored: dockerfile, makefile, shell
          plugin_languages_colors: github
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          # 最近活动
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 14
          plugin_activity_visibility: public

          # 贡献日历
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # GitHub 新闻
          plugin_notable: yes
          plugin_notable_filter: stars:>10

          # === 样式配置 ===
          output_action: gist
          svg_type: repository
          theme: default
          config_padding: 6%, 6%
          config_display: large

      # 提交到仓库
      - name: Push SVG
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f github-metrics.svg || true
          git diff --staged --quiet || git commit -m "chore: update github metrics"
          git push || true
